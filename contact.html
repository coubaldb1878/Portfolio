<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drew Coubal's Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shrikhand&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/cfc3f6d737.js" crossorigin="anonymous"></script>
<link rel="icon" type="image/png" href="images/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
    <link rel="shortcut icon" href="images/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Drews Portfolio" />
    <link rel="manifest" href="images/site.webmanifest" />
<body>
    <header>
        <img src="images/portfolio_logo_white_ill.svg" alt="logo that Drew Coubal created for his portfolio that combines the initails of his name. The D and B are next to each other and the C for his lat name is below them." >
        <nav>
            <a href="index.html">ABOUT</a>
            <a href="art.html">MY ART</a>
            <a href="contact.html">CONTACT</a>
        </nav>
    </header>
    <main>
        <section >
            <h1 class="contact">CONTACT</h1>
        </section>
        <form>
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name"><br>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email"><br>
            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="5" cols="30"></textarea><br>
            <div class="action">
                <input type="reset" value="Reset">
                <input type="submit" value="Submit">
            </div>
            
            
        </form>
    </main>
    <footer>
        <div>
            <p>Follow My Socials</p>
        </div>
        <div class="socials">
            <a href="https://www.instagram.com/drewcoubal/">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://www.tiktok.com/@artdrewbydrew">
                <i class="fab fa-tiktok"></i>
            </a>
        </div>
        <div>
            <nav>
                <a href="index.html">Home</a>
                <a href="art.html">My Art</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </footer>
</body>
</html>
